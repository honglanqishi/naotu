name: Electron Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

concurrency:
  group: electron-release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  release-windows:
    name: Build Windows Desktop Release
    runs-on: windows-latest
    env:
      BACKEND_INTERNAL_URL: http://127.0.0.1:3001
      NEXT_PUBLIC_API_URL: ''
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build backend
        run: pnpm --dir backend build

      - name: Build frontend standalone output
        run: pnpm --dir frontend build

      - name: Build electron main process
        run: pnpm --dir electron build

      - name: Package desktop app
        run: pnpm --dir electron dist -- --win

      - name: Upload desktop artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            electron/release/*.exe
            electron/release/*.blockmap
            electron/release/latest*.yml
          fail_on_unmatched_files: true
name: CI

on:
  pull_request:
    paths:
      - '.github/workflows/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'frontend/**'
      - 'backend/**'
      - 'database/**'
      - 'electron/**'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'frontend/**'
      - 'backend/**'
      - 'database/**'
      - 'electron/**'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      shared: ${{ steps.filter.outputs.shared }}
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      database: ${{ steps.filter.outputs.database }}
      electron: ${{ steps.filter.outputs.electron }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            shared:
              - '.github/workflows/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
            frontend:
              - 'frontend/**'
            backend:
              - 'backend/**'
            database:
              - 'database/**'
            electron:
              - 'electron/**'

  database-check:
    name: Database Check
    needs: changes
    if: needs.changes.outputs.shared == 'true' || needs.changes.outputs.database == 'true' || needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgres://ci:ci@127.0.0.1:5432/naotu_ci
      SQLITE_PATH: ../ci-local.db
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck database package
        run: pnpm --dir database build

      - name: Verify Drizzle config loads
        run: pnpm --dir database check:config

  backend-build:
    name: Backend Build
    needs: changes
    if: needs.changes.outputs.shared == 'true' || needs.changes.outputs.backend == 'true' || needs.changes.outputs.database == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build backend
        run: pnpm --dir backend build

  frontend-build:
    name: Frontend Build
    needs: changes
    if: needs.changes.outputs.shared == 'true' || needs.changes.outputs.frontend == 'true' || needs.changes.outputs.backend == 'true' || needs.changes.outputs.database == 'true'
    runs-on: ubuntu-latest
    env:
      BACKEND_INTERNAL_URL: http://127.0.0.1:3001
      NEXT_PUBLIC_API_URL: ''
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm --dir frontend build

  electron-build:
    name: Electron Build
    needs: changes
    if: needs.changes.outputs.shared == 'true' || needs.changes.outputs.electron == 'true' || needs.changes.outputs.frontend == 'true' || needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build electron main process
        run: pnpm --dir electron build